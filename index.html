<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ImagineX - AI Text-to-Image generation powered by Hugging Face." />
  <title>ImagineX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #f8f9fa;
      --surface:   #ffffff;
      --border:    #e5e7eb;
      --border-hi: #d1d5db;
      --text:      #1f2937;
      --muted:     #6b7280;
      --accent:    #6366f1;
      --accent-hi: #4f46e5;
      --danger:    #ef4444;
      --danger-bg: rgba(239,68,68,.08);
      --radius:    8px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    .brand-name {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .brand-tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    .settings-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .settings-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .settings-btn.active { border-color: var(--accent); color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 32px;
      align-items: start;
    }
    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }

    .panel { display: flex; flex-direction: column; gap: 24px; }

    .api-config {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .api-config h3 {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .api-config input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .api-config input:focus { border-color: var(--accent); }
    .api-config .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    .api-config .hint a { color: var(--accent); text-decoration: none; }
    .api-config .hint a:hover { text-decoration: underline; }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .model-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .model-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: border-color .15s, background .15s;
    }
    .model-btn:hover { border-color: var(--border-hi); background: #161616; }
    .model-btn.active {
      border-color: var(--accent);
      background: rgba(124,106,247,.07);
      color: var(--accent-hi);
    }
    .model-btn .model-name { font-weight: 500; }
    .model-btn .model-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .model-btn.active .model-tag {
      border-color: rgba(124,106,247,.3);
      color: var(--accent);
      background: rgba(124,106,247,.1);
    }

    .prompt-section {}
    .prompt-section label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .prompt-section textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      resize: vertical;
      outline: none;
      transition: border-color .15s;
      line-height: 1.6;
    }
    .prompt-section textarea:focus { border-color: var(--accent); }
    .prompt-section textarea::placeholder { color: #3d3d3d; }

    .gen-btn {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .15s, opacity .15s;
    }
    .gen-btn:hover:not(:disabled) { background: var(--accent-hi); }
    .gen-btn:disabled { opacity: .35; cursor: not-allowed; }

    .error-box {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 12px 14px;
      background: var(--danger-bg);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: var(--radius);
      color: #f87171;
      font-size: 13px;
      line-height: 1.5;
    }
    .error-box svg { flex-shrink: 0; margin-top: 1px; }

    .output {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .placeholder {
      text-align: center;
      padding: 40px;
    }
    .placeholder-ring {
      width: 56px;
      height: 56px;
      border: 1px solid var(--border-hi);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .placeholder h3 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .placeholder p { font-size: 13px; color: var(--muted); }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border-hi);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .loader p { font-size: 13px; color: var(--muted); }

    .result { width: 100%; }
    .result img {
      width: 100%;
      display: block;
    }
    .result-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .result-model { font-size: 12px; color: var(--muted); }
    .result-actions { display: flex; gap: 8px; }
    .icon-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .icon-btn:hover { border-color: var(--border-hi); color: var(--text); }
    .icon-btn.primary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .icon-btn.primary:hover { background: rgba(124,106,247,.1); }

    .history-section {
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .history-header h2 { font-size: 14px; font-weight: 500; color: var(--text); }
    .clear-btn {
      font: inherit;
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
    }
    .clear-btn:hover { color: var(--danger); }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s;
    }
    .history-card:hover { border-color: var(--border-hi); }
    .history-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
    .history-info { padding: 10px 12px; }
    .history-prompt {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .history-model-tag { font-size: 11px; color: var(--muted); }

    footer {
      margin-top: 56px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: #333;
      text-align: center;
    }

    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fadein { animation: fadein .3s ease; }

    .spin-inline {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="shell">

  <header class="header">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-name">ImagineX</div>
        <div class="brand-tagline">AI Text-to-Image</div>
      </div>
    </div>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="model-section">
        <p class="section-label">Model</p>
        <div class="model-list" id="model-list"></div>
      </div>

      <div class="prompt-section">
        <label for="prompt">Prompt</label>
        <textarea id="prompt" placeholder="A misty mountain at dawn, oil painting, soft light..."></textarea>
        <button id="gen-btn" class="gen-btn" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
          </svg>
          Generate
        </button>
      </div>

      <div id="error-box" class="error-box" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span id="error-text"></span>
      </div>

    </div>
    <div class="output" id="output">

      <div id="placeholder" class="placeholder">
        <div class="placeholder-ring">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </div>
        <h3>Ready to generate</h3>
        <p>Enter a prompt and click Generate.</p>
      </div>

      <div id="loader" class="loader" style="display:none;">
        <div class="spinner"></div>
        <p>Generating your image…</p>
      </div>

      <div id="result" class="result fadein" style="display:none;">
        <img id="result-img" src="" alt="" />
        <div class="result-bar">
          <span id="result-model" class="result-model"></span>
          <div class="result-actions">
            <button id="download-btn" class="icon-btn primary">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Save
            </button>
            <button id="new-btn" class="icon-btn">New</button>
          </div>
        </div>
      </div>

    </div>
  </div>
  <section id="history-section" class="history-section" style="display:none;">
    <div class="history-header">
      <h2>History</h2>
      <button id="clear-btn" class="clear-btn">Clear all</button>
    </div>
    <div class="history-grid" id="history-grid"></div>
  </section>

  <footer>
    &copy; 2026 ImagineX · Powered by Pollinations.AI
  </footer>

</div>

<script>
  const MODELS = [
    { id: "flux",             name: "Flux",              tag: "Best Quality"  },
    { id: "turbo",            name: "Turbo",             tag: "Fast"          },
    { id: "sdxl",             name: "SDXL",              tag: "High Res"      },
  ];

  let selectedModel = MODELS[0].id;
  let currentImageUrl = null;
  let currentPrompt = "";
  let history = [];

  const $ = id => document.getElementById(id);
  const modelList = $("model-list");
  const promptEl = $("prompt");
  const genBtn = $("gen-btn");
  const errorBox = $("error-box");
  const errorText = $("error-text");
  const placeholder = $("placeholder");
  const loader = $("loader");
  const result = $("result");
  const resultImg = $("result-img");
  const resultModel = $("result-model");
  const downloadBtn = $("download-btn");
  const newBtn = $("new-btn");
  const historySection = $("history-section");
  const historyGrid = $("history-grid");
  const clearBtn = $("clear-btn");

  function init() {
    history = JSON.parse(localStorage.getItem("ix_history") || "[]");
    buildModels();
    renderHistory();
    syncBtn();
  }

  function buildModels() {
    modelList.innerHTML = "";
    MODELS.forEach(m => {
      const btn = document.createElement("button");
      btn.className = "model-btn" + (m.id === selectedModel ? " active" : "");
      btn.type = "button";
      btn.innerHTML = `<span class="model-name">${m.name}</span><span class="model-tag">${m.tag}</span>`;
      btn.addEventListener("click", () => {
        selectedModel = m.id;
        buildModels();
      });
      modelList.appendChild(btn);
    });
  }

  promptEl.addEventListener("input", syncBtn);
  function syncBtn() {
    genBtn.disabled = !promptEl.value.trim();
  }

  promptEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
  });

  genBtn.addEventListener("click", generate);

  async function generate() {
    currentPrompt = promptEl.value.trim();
    if (!currentPrompt) {
      showError("Please enter a prompt first.");
      return;
    }

    setLoading(true);
    hideError();
    show(placeholder, false);
    show(result, false);

    try {
      const encodedPrompt = encodeURIComponent(currentPrompt);
      const seed = Math.floor(Math.random() * 1000000);
      const width = 1024;
      const height = 1024;
      const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?model=${selectedModel}&width=${width}&height=${height}&seed=${seed}&nologo=true`;

      const res = await fetch(imageUrl);
      if (!res.ok) throw new Error(`Image generation failed: HTTP ${res.status}`);

      const blob = await res.blob();
      const objectUrl = URL.createObjectURL(blob);
      currentImageUrl = objectUrl;

      const modelName = MODELS.find(m => m.id === selectedModel)?.name || selectedModel;
      resultImg.src = objectUrl;
      resultImg.alt = currentPrompt;
      resultModel.textContent = `Generated with ${modelName}`;
      show(result, true);

      history = [{ id: Date.now(), url: objectUrl, prompt: currentPrompt, model: modelName }, ...history].slice(0, 12);
      localStorage.setItem("ix_history", JSON.stringify(history));
      renderHistory();
    } catch (err) {
      let msg = err.message || "Unknown error occurred.";
      if (msg === "Failed to fetch" || msg.toLowerCase().includes("networkerror")) {
        msg = "Network error. Please check your internet connection and try again.";
      }
      showError(msg);
      show(placeholder, true);
    } finally {
      setLoading(false);
    }
  }

  downloadBtn.addEventListener("click", () => {
    if (!currentImageUrl) return;
    const a = document.createElement("a");
    a.href = currentImageUrl;
    a.download = `imaginex-${Date.now()}.jpg`;
    a.click();
  });

  newBtn.addEventListener("click", () => {
    show(result, false);
    show(placeholder, true);
    currentImageUrl = null;
  });

  clearBtn.addEventListener("click", () => {
    if (!confirm("Clear all history?")) return;
    history = [];
    localStorage.removeItem("ix_history");
    renderHistory();
  });

  function renderHistory() {
    historySection.style.display = history.length ? "block" : "none";
    historyGrid.innerHTML = "";
    history.forEach(item => {
      const card = document.createElement("div");
      card.className = "history-card";
      card.innerHTML = `
        <img src="${item.url}" alt="${item.prompt}" />
        <div class="history-info">
          <p class="history-prompt">${item.prompt}</p>
          <p class="history-model-tag">${item.model}</p>
        </div>`;
      card.addEventListener("click", () => {
        currentImageUrl = item.url;
        currentPrompt = item.prompt;
        promptEl.value = item.prompt;
        resultImg.src = item.url;
        resultImg.alt = item.prompt;
        resultModel.textContent = `Generated with ${item.model}`;
        hideError();
        show(placeholder, false);
        show(loader, false);
        show(result, true);
        syncBtn();
      });
      historyGrid.appendChild(card);
    });
  }

  function setLoading(on) {
    show(loader, on);
    genBtn.disabled = on;
    genBtn.innerHTML = on
      ? `<div class="spin-inline"></div> Generating…`
      : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Generate`;
    if (!on) syncBtn();
  }

  function show(el, visible) {
    el.style.display = visible ? "" : "none";
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorBox.style.display = "flex";
  }

  function hideError() {
    errorBox.style.display = "none";
  }

  init();
</script>
</body>
</html>
